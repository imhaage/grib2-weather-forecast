<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather forecast (source: Météo France AROME)</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f6f8;
        color: #1a1d23;
        min-height: 100vh;
      }

      header {
        background: #1a1d23;
        color: #fff;
        padding: 18px 32px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      header h1 {
        font-size: 1.15rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      header span {
        font-size: 0.8rem;
        color: #8b919e;
        font-weight: 400;
      }

      /* ══════════════════════════════════════════════════════
       HOME VIEW
    ══════════════════════════════════════════════════════ */

      #view-home main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 24px;
      }

      /* ── Drop zone ── */
      #drop-zone {
        border: 2px dashed #c5cad4;
        border-radius: 12px;
        background: #fff;
        padding: 18px 32px;
        text-align: center;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      #drop-zone:hover,
      #drop-zone.over {
        border-color: #3b82f6;
        background: #eff6ff;
      }
      #drop-zone .icon {
        font-size: 0.9rem;
        margin-bottom: 4px;
      }
      #drop-zone p {
        color: #555e6d;
        font-size: 0.8rem;
        line-height: 1.4;
      }
      #drop-zone p strong {
        color: #1a1d23;
      }
      #drop-zone small {
        color: #8b919e;
        font-size: 0.72rem;
      }
      #file-input {
        display: none;
      }

      /* ── Status ── */
      #status {
        margin-top: 16px;
        font-size: 0.875rem;
        color: #555e6d;
        min-height: 1.4em;
        text-align: center;
      }
      #status.error {
        color: #dc2626;
      }

      /* ── File summary ── */
      #file-summary {
        display: none;
        margin-top: 28px;
        background: #fff;
        border: 1px solid #e2e6ec;
        border-radius: 10px;
        padding: 18px 22px;
        gap: 32px;
        flex-wrap: wrap;
        align-items: center;
      }
      #file-summary .meta-item {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      #file-summary .meta-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #8b919e;
      }
      #file-summary .meta-value {
        font-size: 0.95rem;
        font-weight: 600;
      }

      /* ── Message cards ── */
      #results {
        display: none;
        margin-top: 28px;
      }
      #results h2 {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: #8b919e;
        margin-bottom: 14px;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
        gap: 16px;
      }

      .card {
        background: #fff;
        border: 1px solid #e2e6ec;
        border-radius: 10px;
        padding: 18px 20px;
        transition: box-shadow 0.15s;
      }
      .card:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .badge {
        background: #1a1d23;
        color: #fff;
        font-family: monospace;
        font-size: 0.85rem;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 6px;
        letter-spacing: 0.03em;
        white-space: nowrap;
      }
      .card-title {
        font-size: 0.95rem;
        font-weight: 600;
        line-height: 1.3;
      }

      .card-rows {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .card-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 0.82rem;
        gap: 8px;
      }
      .card-row .key {
        color: #8b919e;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .card-row .val {
        font-weight: 500;
        text-align: right;
        word-break: break-word;
      }
      .card-divider {
        border: none;
        border-top: 1px solid #f0f1f4;
        margin: 10px 0;
      }

      .btn-grid {
        margin-top: 16px;
        width: 100%;
        padding: 9px 0;
        background: #1a1d23;
        color: #fff;
        border: none;
        border-radius: 7px;
        font-size: 0.82rem;
        font-weight: 500;
        cursor: pointer;
        letter-spacing: 0.02em;
        transition: background 0.15s;
      }
      .btn-grid:hover {
        background: #353b4a;
      }

      /* ══════════════════════════════════════════════════════
       GRID VIEW
    ══════════════════════════════════════════════════════ */

      #view-grid {
        display: none;
      }
      #view-grid main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 24px;
      }

      /* ── Toolbar ── */
      #grid-toolbar {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 22px;
        flex-wrap: wrap;
      }

      .btn-back {
        background: #fff;
        border: 1px solid #c5cad4;
        border-radius: 7px;
        padding: 7px 14px;
        cursor: pointer;
        font-size: 0.84rem;
        color: #555e6d;
        flex-shrink: 0;
        transition:
          background 0.12s,
          border-color 0.12s;
      }
      .btn-back:hover {
        background: #f0f1f4;
        border-color: #8b919e;
      }

      #gv-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      #gv-name {
        font-size: 0.95rem;
        font-weight: 600;
      }
      #gv-sub {
        font-size: 0.78rem;
        color: #8b919e;
        margin-top: 2px;
      }

      #grid-stats {
        display: flex;
        gap: 28px;
        flex-wrap: wrap;
      }
      .stat-item {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .stat-label {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: #8b919e;
      }
      .stat-value {
        font-size: 0.88rem;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      /* ── Map area ── */
      #map-wrap {
        position: relative;
        border-radius: 10px;
        overflow: hidden;
      }

      #map {
        width: 100%;
        height: 600px;
      }

      #map-wrap:fullscreen {
        width: 100%;
        height: 100%;
      }
      #map-wrap:fullscreen #map {
        height: 100%;
      }
      /* Safari */
      #map-wrap:-webkit-full-screen {
        width: 100%;
        height: 100%;
      }
      #map-wrap:-webkit-full-screen #map {
        height: 100%;
      }

      #map-tooltip {
        position: absolute;
        z-index: 10;
        pointer-events: none;
        background: rgba(0, 0, 0, 0.72);
        color: #fff;
        padding: 5px 9px;
        border-radius: 5px;
        font-size: 0.78rem;
        white-space: nowrap;
      }

      /* ── Color scale ── */
      #colorscale {
        display: none;
        align-items: center;
        gap: 10px;
        margin-top: 12px;
        font-size: 0.76rem;
        color: #555e6d;
        font-variant-numeric: tabular-nums;
        height: 1.5rem;
      }
      #cs-bar {
        flex: 1;
        height: 10px;
        border-radius: 5px;
      }
      #cs-unit {
        color: #8b919e;
        margin-left: 4px;
      }

      /* ── Palette selector ── */
      #palette-ctrl {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.82rem;
        color: #555e6d;
        margin-left: auto;
      }
      #palette-select {
        background: #fff;
        border: 1px solid #c5cad4;
        border-radius: 7px;
        padding: 6px 10px;
        font-size: 0.82rem;
        color: #1a1d23;
        cursor: pointer;
        transition: border-color 0.12s;
      }
      #palette-select:hover {
        border-color: #8b919e;
      }
      #arome-var-select {
        background: #fff;
        border: 1px solid #c5cad4;
        border-radius: 7px;
        padding: 6px 10px;
        font-size: 0.82rem;
        color: #1a1d23;
        cursor: pointer;
        transition: border-color 0.12s;
      }
      #arome-var-select:hover {
        border-color: #8b919e;
      }

      /* ══════════════════════════════════════════════════════
       AROME SHORTCUT (home)
    ══════════════════════════════════════════════════════ */
      #arome-shortcut {
        margin-top: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      #btn-sp1,
      #btn-sp2 {
        background: #1a1d23;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 11px 28px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.02em;
        transition: background 0.15s;
      }
      #btn-sp1:hover,
      #btn-sp2:hover {
        background: #353b4a;
      }
      #arome-shortcut small {
        font-size: 0.78rem;
        color: #8b919e;
      }



      #arome-dl-panel {
        padding: 20px 24px;
        border-top: 1px solid #e2e6ec;
      }
      #arome-dl-status {
        font-size: 0.88rem;
        color: #555e6d;
        margin-bottom: 16px;
      }
      #arome-dl-bars {
        display: grid;
        grid-template-columns: repeat(24, 1fr);
        gap: 3px;
        font-size: 0.72rem;
      }
      .arome-dl-item {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.25rem 0;
        border-radius: 4px;
        color: #555e6d;
        background: linear-gradient(to right, #93c5fd var(--pct, 0%), #e2e6ec var(--pct, 0%));
      }
      .arome-dl-item.done {
        background: #22c55e;
        color: #fff;
      }

      /* ══════════════════════════════════════════════════════
       AROME PLAYER TOOLBAR (inside #view-grid)
    ══════════════════════════════════════════════════════ */
      #arome-player-toolbar {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 22px;
        flex-wrap: wrap;
      }
      #arome-slider-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
      }
      #arome-slider {
        flex: 1;
        cursor: pointer;
      }

      #arome-hour-label {
        font-family: monospace;
        font-size: 0.88rem;
        font-weight: 700;
        min-width: 44px;
        white-space: nowrap;
      }
      #arome-valid-time {
        font-size: 0.76rem;
        color: #8b919e;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Weather forecast</h1>
      <span>Source: Météo France AROME</span>
    </header>

    <!-- ══════════════════════════════════════════════════════
     HOME VIEW
══════════════════════════════════════════════════════ -->
    <div id="view-home">
      <main>
        <div id="arome-shortcut">
          <button id="btn-sp1">Météo France AROME SP1 0.01° (last available run)</button>
          <button id="btn-sp2">Météo France AROME SP2 0.01° (last available run)</button>
        </div>

        <hr style="border: none; border-top: 1px solid #e2e6ec; margin: 2rem 0;" />

        <div
          id="drop-zone"
          role="button"
          tabindex="0"
          aria-label="Upload a GRIB2 file"
        >
          <div class="icon">🌐</div>
          <p><strong>Drop a GRIB2 file here</strong><br />or click to select</p>
          <br />
          <small>.grib2 / .grib</small>
          <input type="file" id="file-input" accept=".grib2,.grib" />
        </div>
        <div id="status"></div>

        <div id="file-summary">
          <div class="meta-item">
            <span class="meta-label">File</span>
            <span class="meta-value" id="s-name">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Size</span>
            <span class="meta-value" id="s-size">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Messages</span>
            <span class="meta-value" id="s-count">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Centre</span>
            <span class="meta-value" id="s-centre">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Reference time</span>
            <span class="meta-value" id="s-reftime">—</span>
          </div>
        </div>

        <div id="results">
          <h2>Variables</h2>
          <div class="cards" id="cards"></div>
        </div>
      </main>
    </div>

    <!-- ══════════════════════════════════════════════════════
     GRID VIEW
══════════════════════════════════════════════════════ -->
    <div id="view-grid">
      <main>
        <div id="gv-meta">
          <div>
            <div id="gv-name"></div>
            <div id="gv-sub"></div>
          </div>
        </div>
        <div id="grid-toolbar">
          <button class="btn-back" id="back-btn">← Variables</button>
          <div id="grid-stats">
            <div class="stat-item">
              <span class="stat-label">Min</span>
              <span class="stat-value" id="gv-min">—</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Max</span>
              <span class="stat-value" id="gv-max">—</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Mean</span>
              <span class="stat-value" id="gv-mean">—</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Valid pts</span>
              <span class="stat-value" id="gv-valid">—</span>
            </div>
          </div>
          <div id="palette-ctrl">
            <label for="palette-select">Palette</label>
            <select id="palette-select">
              <optgroup label="Custom">
                <option value="TempC">TempC (Temperature)</option>
              </optgroup>
              <optgroup label="Perceptually uniform">
                <option value="Plasma" selected>Plasma</option>
                <option value="Viridis">Viridis</option>
                <option value="Magma">Magma</option>
                <option value="Inferno">Inferno</option>
              </optgroup>
              <optgroup label="Diverging">
                <option value="Spectral">Spectral</option>
                <option value="RdBu">RdBu</option>
                <option value="RdYlBu">RdYlBu</option>
              </optgroup>
              <optgroup label="Sequential">
                <option value="YlOrRd">YlOrRd</option>
                <option value="OrRd">OrRd</option>
                <option value="Blues">Blues</option>
                <option value="YlGnBu">YlGnBu</option>
              </optgroup>
            </select>
          </div>
        </div>

        <!-- AROME player toolbar (shown instead of #grid-toolbar in AROME mode) -->
        <div id="arome-player-toolbar" style="display: none">
          <button class="btn-back" id="arome-back-btn">← Home</button>
          <select id="arome-var-select"></select>
          <div id="palette-ctrl-arome" class="palette-ctrl-shared">
            <label for="palette-select-arome">Palette</label>
            <select id="palette-select-arome" class="palette-select-el">
              <optgroup label="Custom">
                <option value="TempC">TempC (Temperature)</option>
              </optgroup>
              <optgroup label="Perceptually uniform">
                <option value="Plasma" selected>Plasma</option>
                <option value="Viridis">Viridis</option>
                <option value="Magma">Magma</option>
                <option value="Inferno">Inferno</option>
              </optgroup>
              <optgroup label="Diverging">
                <option value="Spectral">Spectral</option>
                <option value="RdBu">RdBu</option>
                <option value="RdYlBu">RdYlBu</option>
              </optgroup>
              <optgroup label="Sequential">
                <option value="YlOrRd">YlOrRd</option>
                <option value="OrRd">OrRd</option>
                <option value="Blues">Blues</option>
                <option value="YlGnBu">YlGnBu</option>
              </optgroup>
            </select>
          </div>
          <div id="arome-slider-wrap">
            <span id="arome-hour-label">+01H</span>
            <input type="range" id="arome-slider" min="0" step="1" value="0" />
            <span id="arome-valid-time"></span>
          </div>
        </div>

        <div id="map-wrap">
          <div id="map"></div>
          <div id="map-tooltip" hidden></div>
        </div>

        <div id="colorscale">
          <span id="cs-min"></span>
          <div id="cs-bar"></div>
          <span id="cs-max"></span>
          <span id="cs-unit"></span>
        </div>

        <div id="arome-dl-panel" style="display: none">
          <p id="arome-dl-status"></p>
          <div id="arome-dl-bars"></div>
        </div>
      </main>
    </div>

    <script type="module">
      import maplibregl from "https://esm.sh/maplibre-gl@4";
      import chroma from "https://esm.sh/chroma-js@2.4.2";
      import {
        iterateGRIB2Messages,
        decodeGRIB2,
        MISSING_VALUE,
      } from "./src/index.js";
      import { computeStats } from "./src/stats.js";
      import {
        CENTRES,
        GENERATING_PROCESS,
        fmtRefTime,
        fmtLevel,
        fmtValidTime,
      } from "./src/wmo-tables.js";

      // ── AROME packages ────────────────────────────────────────────────────────────
      const PACKAGES = {
        SP1: {
          key: "SP1",
          label: "AROME SP1 0.01°",
          variables: [
            { shortName: "t",     name: "Temperature",                          units: "°C",     level: "2 m above ground"  },
            { shortName: "r",     name: "Relative humidity",                    units: "%",      level: "2 m above ground"  },
            { shortName: "u",     name: "U-component of wind",                  units: "m s-1",  level: "10 m above ground" },
            { shortName: "v",     name: "V-component of wind",                  units: "m s-1",  level: "10 m above ground" },
            { shortName: "ugust", name: "U-component of wind (gust)",           units: "m s-1",  level: "10 m above ground" },
            { shortName: "vgust", name: "V-component of wind (gust)",           units: "m s-1",  level: "10 m above ground" },
          ],
        },
        SP2: {
          key: "SP2",
          label: "AROME SP2 0.01°",
          variables: [
            { shortName: "p",     name: "Pressure",                             units: "hPa",    level: "Ground surface"    },
            { shortName: "cape",  name: "Convective available potential energy", units: "J kg-1", level: "Ground surface"    },
            { shortName: "lcc",   name: "Low cloud cover",                      units: "%",      level: "Ground surface"    },
            { shortName: "mcc",   name: "Medium cloud cover",                   units: "%",      level: "Ground surface"    },
            { shortName: "hcc",   name: "High cloud cover",                     units: "%",      level: "Ground surface"    },
            { shortName: "tgrp",  name: "Graupel (snow pellets) precipitation", units: "mm/h",   level: "Ground surface"    },
            { shortName: "rrate", name: "Rain precipitation",                   units: "mm/h",   level: "Ground surface"    },
            { shortName: "srate", name: "Snow precipitation",                   units: "mm/h",   level: "Ground surface"    },
          ],
        },
      };

      // ── State ─────────────────────────────────────────────────────────────────────
      let fileState = null; // { messages: Array }
      let gridState = null; // { values, min, range, grid, product }
      let currentPalette = "Plasma";
      let map = null; // MapLibre instance (created once, reused)
      let heatCanvas = null; // offscreen canvas for heatmap rendering
      let aromeState = null; // { resources, buffers, decoded, decodedOrder, variable }
      let isDecoding = false;
      let pendingHourIdx = null;

      // ── Helpers ───────────────────────────────────────────────────────────────────

      const fmtNum = (v, d = 4) => v.toFixed(d);

      function fmtSize(b) {
        return b >= 1e6
          ? (b / 1e6).toFixed(1) + " MB"
          : (b / 1e3).toFixed(0) + " KB";
      }
      function fmtGrid(g) {
        return (
          `${g.ni} × ${g.nj} pts · ` +
          `${g.latitudeOfLastPoint}°–${g.latitudeOfFirstPoint}°N · ` +
          `${g.longitudeOfFirstPoint}°–${g.longitudeOfLastPoint}°E`
        );
      }
      function code(table, v) {
        return table[v] ? `${table[v]} (${v})` : String(v);
      }

      // ── Colormap (chroma-js) ──────────────────────────────────────────────────────

      const CUSTOM_SCALES = {
        Plasma: ["#0d0887", "#7e03a8", "#cb4679", "#f89441", "#f0f921"],
        Magma: ["#000004", "#51127c", "#b73779", "#fc8961", "#fcfdbf"],
        Inferno: ["#000004", "#420a68", "#932667", "#dd513a", "#fcffa4"],
        // Custom temperature palette: white at 0°C (t=0.333 on the -25…50 scale).
        // Stops are positioned non-uniformly to balance the cold (33%) / warm (67%) ranges.
        // T°C → t: (T + 25) / 75
        TempC: {
          colors: [
            '#08306b', // t=0.000 → -25°C  deep navy
            '#2166ac', // t=0.133 → -15°C  medium blue
            '#92c5de', // t=0.267 →  -5°C  light blue
            '#ffffff', // t=0.333 →   0°C  white (freezing)
            '#ffc800', // t=0.567 →  17°C  warm amber yellow
            '#ff6600', // t=0.733 →  30°C  orange
            '#cc1100', // t=0.867 →  40°C  red
            '#67000d', // t=1.000 →  50°C  dark red
          ],
          domain: [0.000, 0.133, 0.267, 0.333, 0.567, 0.733, 0.867, 1.000],
        },
      };

      const INVERTED_PALETTES = new Set([
        "Plasma", "Viridis", "Magma", "Inferno", "Spectral", "RdBu", "RdYlBu",
      ]);

      const VARIABLE_PALETTES = {
        t:     "TempC",
        r:     "Blues",
        u:     "Viridis",  v:     "Viridis",
        ugust: "Viridis",  vgust: "Viridis",
        p:     "Spectral",
        lcc:   "Viridis",  mcc:   "Viridis",  hcc:   "Viridis",
        rrate: "Spectral", srate: "Spectral", tgrp: "Spectral",
      };

      // Static color scale ranges for AROME variables (enables timestep comparison).
      // Precipitation uses log:true — values are log-normalized between 0.1 and max.
      const STATIC_SCALES = {
        t:     { min: -25,  max: 50   },
        r:     { min: 0,    max: 100  },
        u:     { min: -30,  max: 30   },
        v:     { min: -30,  max: 30   },
        ugust: { min: 0,    max: 40   },
        vgust: { min: 0,    max: 40   },
        p:     { min: 950,  max: 1050 },
        cape:  { min: 0,    max: 4000 },
        lcc:   { min: 0, max: 100, zeroThreshold: 0.005 },
        mcc:   { min: 0, max: 100, zeroThreshold: 0.005 },
        hcc:   { min: 0, max: 100, zeroThreshold: 0.005 },
        rrate: { min: 0,    max: 150, log: true },
        srate: { min: 0,    max: 20,  log: true },
        tgrp:  { min: 0,    max: 15,  log: true, zeroThreshold: 0.005 },
      };

      function applyDefaultPalette(shortName) {
        const pal = VARIABLE_PALETTES[shortName];
        if (!pal) return;
        currentPalette = pal;
        document.getElementById("palette-select").value = pal;
        document.getElementById("palette-select-arome").value = pal;
      }

      function makeScale(paletteName) {
        const entry = CUSTOM_SCALES[paletteName];
        if (entry?.colors) {
          // Non-uniform stops: {colors, domain}
          return chroma.scale(entry.colors).domain(entry.domain);
        }
        const scale = chroma.scale(entry ?? chroma.brewer[paletteName]);
        return INVERTED_PALETTES.has(paletteName) ? scale.domain([1, 0]) : scale;
      }

      function buildLUT(paletteName) {
        const sc = makeScale(paletteName);
        const lut = new Uint8Array(256 * 3);
        for (let i = 0; i < 256; i++) {
          const [r, g, b] = sc(i / 255).rgb();
          lut[i * 3] = r;
          lut[i * 3 + 1] = g;
          lut[i * 3 + 2] = b;
        }
        return lut;
      }

      // Mercator helpers (latitude in degrees)
      const mercatorY = (lat) =>
        Math.log(Math.tan(Math.PI / 4 + (lat * Math.PI) / 360));
      const invMercatorY = (my) =>
        ((2 * Math.atan(Math.exp(my)) - Math.PI / 2) * 180) / Math.PI;

      // Compute the Mercator-proportional canvas height for a given grid.
      // The canvas width equals grid.ni; height is chosen so that one pixel ≈ same
      // arc-length in both x and y when viewed in Web Mercator.
      function mercatorCanvasHeight(grid) {
        const {
          ni,
          latitudeOfFirstPoint: la1,
          latitudeOfLastPoint: la2,
          longitudeOfFirstPoint: lo1,
          longitudeOfLastPoint: lo2,
        } = grid;
        const spanY = mercatorY(la1) - mercatorY(la2);
        const spanX = ((lo2 - lo1) * Math.PI) / 180;
        return Math.round((ni * spanY) / spanX);
      }

      // Render heatmap into the offscreen heatCanvas, then notify MapLibre.
      // The canvas is pre-warped to Web Mercator: each row is inverse-Mercator'd
      // back to latitude so the image aligns perfectly with the basemap.
      function renderHeatmap() {
        const { values, min, range, grid } = gridState;
        const {
          ni,
          nj,
          latitudeOfFirstPoint: la1,
          latitudeOfLastPoint: la2,
          dj,
        } = grid;
        const lut = buildLUT(currentPalette);
        const sn = gridState.product?.shortName;
        // Variables where zero value → transparent (no color shown for absence of phenomenon)
        const isTransparentZero = sn === "rrate" || sn === "srate" || sn === "tgrp"
                                || sn === "lcc"   || sn === "mcc"  || sn === "hcc";
        const isLog = gridState.staticScale?.log ?? false;
        // Log scale: normalize v ∈ [0.1, max] logarithmically → [0, 1]
        const logDenom = isLog ? Math.log(gridState.staticScale.max / 0.1) : 1;
        const zeroThreshold = gridState.staticScale?.zeroThreshold ?? 0;
        const outW = heatCanvas.width; // = ni
        const outH = heatCanvas.height; // Mercator-proportional
        const ctx = heatCanvas.getContext("2d");
        const img = ctx.createImageData(outW, outH);
        const px = img.data;

        const my1 = mercatorY(la1);
        const mySpan = my1 - mercatorY(la2);

        for (let py = 0; py < outH; py++) {
          // Map output row → Mercator Y → geographic latitude
          const lat = invMercatorY(my1 - (py / outH) * mySpan);
          if (lat > la1 || lat < la2) continue;

          const row = Math.min(
            Math.max(Math.round((la1 - lat) / dj), 0),
            nj - 1,
          );
          const rowOff = row * ni;
          const imgRow = py * outW;

          for (let col = 0; col < outW; col++) {
            const off = (imgRow + col) * 4;
            const v = values[rowOff + col];
            if (v <= MISSING_VALUE) {
              if (!isTransparentZero) {
                px[off] = px[off + 1] = px[off + 2] = 180;
                px[off + 3] = 100;
              }
            } else if (isTransparentZero && v <= zeroThreshold) {
              /* at or below zero threshold → transparent */
            } else {
              let t;
              if (isLog) {
                // log-normalize: v=0.1 → 0, v=max → 1; clamp to [0,1]
                t = Math.max(0, Math.min(1, Math.log(Math.max(v, 0.1) / 0.1) / logDenom));
              } else {
                t = Math.max(0, Math.min(1, (v - min) / range));
              }
              const li = Math.min(Math.round(t * 255), 255) * 3;
              px[off] = lut[li];
              px[off + 1] = lut[li + 1];
              px[off + 2] = lut[li + 2];
              px[off + 3] = 255;
            }
          }
        }
        ctx.putImageData(img, 0, 0);

        // Update legend bar
        const sc = makeScale(currentPalette);
        const stops = Array.from({ length: 8 }, (_, i) => sc(i / 7).css()).join(
          ", ",
        );
        document.getElementById("cs-bar").style.background =
          `linear-gradient(to right, ${stops})`;

        if (map) map.triggerRepaint();
      }

      // ── Hover tooltip ─────────────────────────────────────────────────────────────

      function setupHoverTooltip() {
        const tooltip = document.getElementById("map-tooltip");
        const mapCanvas = map.getCanvas();

        map.on("mousemove", (e) => {
          if (!gridState) return;
          const { lat, lng } = e.lngLat;
          const { grid, values, product } = gridState;
          const {
            ni,
            latitudeOfFirstPoint: la1,
            longitudeOfFirstPoint: lo1,
            latitudeOfLastPoint: la2,
            longitudeOfLastPoint: lo2,
            di,
            dj,
          } = grid;

          // Outside domain
          if (lat > la1 || lat < la2 || lng < lo1 || lng > lo2) {
            tooltip.hidden = true;
            mapCanvas.style.cursor = "";
            return;
          }

          const row = Math.round((la1 - lat) / dj);
          const col = Math.round((lng - lo1) / di);
          const idx = row * ni + col;
          const val =
            idx >= 0 && idx < values.length ? values[idx] : MISSING_VALUE;

          if (val <= MISSING_VALUE) {
            tooltip.hidden = true;
            mapCanvas.style.cursor = "default";
            return;
          }

          mapCanvas.style.cursor = "crosshair";
          tooltip.hidden = false;
          tooltip.textContent = `${product.name} : ${val.toFixed(2)} ${gridState.displayUnits ?? product.units}`;
          const wrap = document.getElementById("map-wrap");
          const rect = wrap.getBoundingClientRect();
          tooltip.style.left = e.originalEvent.clientX - rect.left + 14 + "px";
          tooltip.style.top = e.originalEvent.clientY - rect.top - 36 + "px";
        });

        map.on("mouseout", () => {
          tooltip.hidden = true;
          mapCanvas.style.cursor = "";
        });
      }

      // ── Card builder ──────────────────────────────────────────────────────────────

      function buildCard(msg) {
        const { index, header, product: p, grid: g } = msg;
        const row = (key, val) => `
    <div class="card-row">
      <span class="key">${key}</span>
      <span class="val">${val}</span>
    </div>`;
        return `
    <div class="card">
      <div class="card-header">
        <span class="badge">${p.shortName}</span>
        <div><div class="card-title">${p.name}</div></div>
      </div>
      <div class="card-rows">
        ${row("Unit", p.units)}
        ${row("Level", fmtLevel(p))}
        ${row("Forecast time (UTC)", fmtValidTime(header, p))}
        ${row("Process", code(GENERATING_PROCESS, p.typeOfGeneratingProcess))}
        <hr class="card-divider">
        ${row("Grid", fmtGrid(g))}
        ${row("Resolution", `${g.di}° × ${g.dj}°`)}
        ${row("Message #", index)}
      </div>
      <button class="btn-grid" data-var="${p.shortName}">View grid</button>
    </div>`;
      }

      // ── Home view: process uploaded file ─────────────────────────────────────────

      function processFile(file) {
        setStatus("Reading file…");
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const buffer = e.target.result;
            const messages = [...iterateGRIB2Messages(buffer)];
            if (messages.length === 0) {
              setStatus("No GRIB2 messages found.", true);
              return;
            }

            fileState = { messages };

            const first = messages[0];
            document.getElementById("s-name").textContent = file.name;
            document.getElementById("s-size").textContent = fmtSize(file.size);
            document.getElementById("s-count").textContent = messages.length;
            document.getElementById("s-centre").textContent =
              CENTRES[first.header.centre] ?? `Centre ${first.header.centre}`;
            document.getElementById("s-reftime").textContent = fmtRefTime(
              first.header,
            );
            document.getElementById("file-summary").style.display = "flex";

            document.getElementById("cards").innerHTML = messages
              .map(buildCard)
              .join("");
            document.getElementById("results").style.display = "block";
            setStatus("");
          } catch (err) {
            setStatus("Error: " + err.message, true);
          }
        };
        reader.onerror = () => setStatus("Could not read file.", true);
        reader.readAsArrayBuffer(file);
      }

      function setStatus(msg, isError = false) {
        const el = document.getElementById("status");
        el.textContent = msg;
        el.className = isError ? "error" : "";
      }

      // Remove the grib2 map layer/source and reset grid display state.
      function clearMapLayer() {
        if (map?.getSource("grib2")) {
          map.removeLayer("grib2-layer");
          map.removeSource("grib2");
        }
        gridState = null;
        document.getElementById("cs-min").style.visibility = "hidden";
        document.getElementById("cs-max").style.visibility = "hidden";
        document.getElementById("cs-unit").style.visibility = "hidden";
      }

      // Populate and show the color scale legend bar.
      function showColorScale(min, max, units) {
        document.getElementById("cs-min").textContent = fmtNum(min, 2);
        document.getElementById("cs-max").textContent = fmtNum(max, 2);
        document.getElementById("cs-unit").textContent = units;
        document.getElementById("cs-min").style.visibility = "visible";
        document.getElementById("cs-max").style.visibility = "visible";
        document.getElementById("cs-unit").style.visibility = "visible";
        document.getElementById("colorscale").style.display = "flex";
      }

      // Create the MapLibre map once. fitBoundsArgs is optional [bounds, options].
      async function initMap(fitBoundsArgs) {
        if (map) return;
        map = new maplibregl.Map({
          container: "map",
          style: "https://tiles.openfreemap.org/styles/positron",
          attributionControl: true,
        });
        await new Promise((r) => map.once("load", r));
        if (fitBoundsArgs) map.fitBounds(...fitBoundsArgs);
        map.addControl(
          new maplibregl.FullscreenControl({
            container: document.getElementById("map-wrap"),
          }),
        );
        setupHoverTooltip();
      }

      function resetApp() {
        fileState = null;
        aromeState = null;
        isDecoding = false;
        pendingHourIdx = null;
        clearMapLayer();
        setStatus("");
        document.getElementById("file-summary").style.display = "none";
        document.getElementById("results").style.display = "none";
        document.getElementById("cards").innerHTML = "";
        document.getElementById("arome-dl-bars").innerHTML = "";
        document.getElementById("arome-dl-panel").style.display = "none";
        location.hash = "";
      }

      // ── Grid view: decode + render on map ────────────────────────────────────────

      async function showGridView(shortName) {
        if (!fileState) {
          location.hash = "";
          return;
        }

        const msg = fileState.messages.find(
          (m) => m.product.shortName === shortName,
        );
        if (!msg) {
          location.hash = "";
          return;
        }

        const p = msg.product;

        // Populate toolbar
        document.getElementById("gv-name").textContent = p.name;
        document.getElementById("gv-sub").textContent =
          `${fmtLevel(p)} · ${fmtValidTime(msg.header, p)}`;

        // Reset stats
        for (const id of ["gv-min", "gv-max", "gv-mean", "gv-valid"]) {
          document.getElementById(id).textContent = "—";
        }
        document.getElementById("colorscale").style.display = "none";

        // Switch view
        document.getElementById("view-home").style.display = "none";
        document.getElementById("view-grid").style.display = "block";

        // Decode (WASM)
        let decoded;
        try {
          decoded = await decodeGRIB2(msg.buffer);
        } catch (err) {
          document.getElementById("map").textContent =
            "Decode error: " + err.message;
          return;
        }

        const { values, grid: gr } = decoded;

        // Stats
        const { min, max, mean, count } = computeStats(values);
        const range = max - min || 1;

        document.getElementById("gv-min").textContent =
          fmtNum(min, 3) + " " + p.units;
        document.getElementById("gv-max").textContent =
          fmtNum(max, 3) + " " + p.units;
        document.getElementById("gv-mean").textContent =
          fmtNum(mean, 3) + " " + p.units;
        document.getElementById("gv-valid").textContent =
          count.toLocaleString();

        // Store state (grid + product needed by hover tooltip)
        gridState = { values, min, range, grid: gr, product: p };

        // Offscreen canvas: full grid width, Mercator-proportional height
        heatCanvas = document.createElement("canvas");
        heatCanvas.width = gr.ni;
        heatCanvas.height = mercatorCanvasHeight(gr);

        // Geographic corners [lng, lat] — clockwise from top-left
        const {
          latitudeOfFirstPoint: la1,
          longitudeOfFirstPoint: lo1,
          latitudeOfLastPoint: la2,
          longitudeOfLastPoint: lo2,
        } = gr;
        const corners = [
          [lo1, la1],
          [lo2, la1],
          [lo2, la2],
          [lo1, la2],
        ];

        // Render heatmap into offscreen canvas
        renderHeatmap();

        // Init MapLibre once
        await initMap();

        // Replace raster source + layer
        if (map.getSource("grib2")) {
          map.removeLayer("grib2-layer");
          map.removeSource("grib2");
        }
        map.addSource("grib2", {
          type: "canvas",
          canvas: heatCanvas,
          coordinates: corners,
          animate: true,
        });
        map.addLayer({
          id: "grib2-layer",
          type: "raster",
          source: "grib2",
          paint: {
            "raster-opacity": 0.8,
            "raster-resampling": "nearest",
          },
        });

        // Fit map to grid bounds
        map.fitBounds(
          [
            [lo1, la2],
            [lo2, la1],
          ],
          { padding: 20, animate: false },
        );

        // Show color scale
        showColorScale(min, max, p.units);
      }

      // ── AROME live data ───────────────────────────────────────────────────────────


      async function fetchAromeResources(packageKey) {
        const resp = await fetch(
          "https://www.data.gouv.fr/api/1/datasets/65bd1247a6238f16e864fa80/",
        );
        if (!resp.ok) throw new Error(`API ${resp.status}`);
        const data = await resp.json();
        return data.resources
          .filter(
            (r) =>
              r.format === "grib2" &&
              r.title &&
              r.title.includes(`__${packageKey}__`),
          )
          .map((r) => {
            const m = r.title.match(/__(\d+)H__/);
            return {
              hour: m ? parseInt(m[1], 10) : -1,
              url: r.url,
              filesize: r.filesize,
            };
          })
          .filter((r) => r.hour >= 1)
          .sort((a, b) => a.hour - b.hour);
      }

      async function downloadFileProg(url, filesize, onProgress) {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const reader = resp.body.getReader();
        const chunks = [];
        let loaded = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          loaded += value.length;
          onProgress(loaded, filesize || loaded);
        }
        const total = chunks.reduce((s, c) => s + c.length, 0);
        const out = new Uint8Array(total);
        let off = 0;
        for (const c of chunks) {
          out.set(c, off);
          off += c.length;
        }
        return out;
      }



      async function aromeShowHour(idx) {
        if (isDecoding) { pendingHourIdx = idx; return; }
        isDecoding = true;
        pendingHourIdx = null;
        try {

        const { resources, buffers, decoded, decodedOrder, variable } =
          aromeState;
        const { hour } = resources[idx];
        document.getElementById("arome-hour-label").textContent =
          `+${String(hour).padStart(2, "0")}H`;

        let data;
        if (decoded.has(hour)) {
          data = decoded.get(hour);
        } else {
          if (decodedOrder.length >= 5) decoded.delete(decodedOrder.shift());
          const buffer = buffers.get(hour);
          if (!buffer) {
            clearMapLayer();
            isDecoding = false;
            return;
          }
          let targetMsg = null;
          for (const msg of iterateGRIB2Messages(buffer)) {
            if (msg.product.shortName === variable) {
              targetMsg = msg;
              break;
            }
          }
          if (!targetMsg) {
            clearMapLayer();
            isDecoding = false;
            return;
          }
          const dec = await decodeGRIB2(targetMsg.buffer);
          data = {
            values: dec.values,
            grid: dec.grid,
            product: dec.product,
            header: dec.header,
          };
          decoded.set(hour, data);
          decodedOrder.push(hour);
        }

        aromeState.currentHour = hour;
        const { values, grid, product, header } = data;

        // Precipitation variables (PDT 4.8) are cumulative since H+00 — show hourly increment.
        const isAccumulation = product.pdtNumber === 8;
        let displayValues = values;
        let isFallback = false;

        if (isAccumulation && idx > 0) {
          const prevHour = resources[idx - 1].hour;

          async function decodePrevValues() {
            if (decoded.has(prevHour)) return decoded.get(prevHour).values;
            const prevBuffer = buffers.get(prevHour);
            if (!prevBuffer) return null;
            let prevMsg = null;
            for (const msg of iterateGRIB2Messages(prevBuffer)) {
              if (msg.product.shortName === variable) { prevMsg = msg; break; }
            }
            if (!prevMsg) return null;
            if (decodedOrder.length >= 5) decoded.delete(decodedOrder.shift());
            const prevDec = await decodeGRIB2(prevMsg.buffer);
            decoded.set(prevHour, { values: prevDec.values, grid: prevDec.grid, product: prevDec.product, header: prevDec.header });
            decodedOrder.push(prevHour);
            return prevDec.values;
          }

          const prevValues = await decodePrevValues();
          if (prevValues !== null) {
            const diff = new Float64Array(values.length);
            for (let i = 0; i < values.length; i++) {
              if (values[i] <= MISSING_VALUE || prevValues[i] <= MISSING_VALUE) {
                diff[i] = MISSING_VALUE;
              } else {
                diff[i] = Math.max(0, values[i] - prevValues[i]);
              }
            }
            displayValues = diff;
          } else {
            isFallback = true;
          }
        }
        // idx === 0 (01H): raw cumulative value equals the 1H increment (model accumulates from 0 at run start).

        if (product.shortName === "t") {
          const c = new Float64Array(displayValues.length);
          for (let i = 0; i < displayValues.length; i++)
            c[i] = displayValues[i] <= MISSING_VALUE ? MISSING_VALUE : displayValues[i] - 273.15;
          displayValues = c;
        } else if (product.shortName === "p") {
          const c = new Float64Array(displayValues.length);
          for (let i = 0; i < displayValues.length; i++)
            c[i] = displayValues[i] <= MISSING_VALUE ? MISSING_VALUE : displayValues[i] / 100;
          displayValues = c;
        }

        const { min: dataMin, max: dataMax, mean, count } = computeStats(displayValues);
        let displayUnits = product.units;
        if (product.shortName === "t") displayUnits = "°C";
        else if (product.shortName === "p") displayUnits = "hPa";
        else if (isAccumulation && !isFallback) displayUnits = "mm/h";
        const staticScale = STATIC_SCALES[product.shortName] ?? null;
        const renderMin = staticScale ? staticScale.min : dataMin;
        const renderMax = staticScale ? staticScale.max : dataMax;
        const range = renderMax - renderMin || 1;
        gridState = { values: displayValues, min: renderMin, range, grid, product, displayUnits, staticScale };

        document.getElementById('gv-name').textContent  = product.name;
        document.getElementById('gv-sub').textContent   =
          `${aromeState.packageKey} · ${fmtLevel(product)} · run ${fmtRefTime(header)}`
          + (isFallback ? ' · (cumulative — prev not loaded)' : '');

        // Create/resize offscreen canvas only when needed
        const needH = mercatorCanvasHeight(grid);
        const canvasChanged =
          !heatCanvas ||
          heatCanvas.width !== grid.ni ||
          heatCanvas.height !== needH;
        if (canvasChanged) {
          heatCanvas = document.createElement("canvas");
          heatCanvas.width = grid.ni;
          heatCanvas.height = needH;
        }
        renderHeatmap();

        // Init map once
        const {
          latitudeOfFirstPoint: la1,
          longitudeOfFirstPoint: lo1,
          latitudeOfLastPoint: la2,
          longitudeOfLastPoint: lo2,
        } = grid;
        const corners = [
          [lo1, la1],
          [lo2, la1],
          [lo2, la2],
          [lo1, la2],
        ];
        await initMap([[[-12, 37.5], [16, 55.4]], { padding: 20, animate: false }]);

        // (Re)create source if canvas changed or source missing
        if (!map.getSource("grib2") || canvasChanged) {
          if (map.getSource("grib2")) {
            map.removeLayer("grib2-layer");
            map.removeSource("grib2");
          }
          map.addSource("grib2", {
            type: "canvas",
            canvas: heatCanvas,
            coordinates: corners,
            animate: true,
          });
          map.addLayer({
            id: "grib2-layer",
            type: "raster",
            source: "grib2",
            paint: { "raster-opacity": 0.8, "raster-resampling": "nearest" },
          });
        }
        // Update stats + colorscale + valid time
        document.getElementById("gv-min").textContent =
          fmtNum(dataMin, 3) + " " + displayUnits;
        document.getElementById("gv-max").textContent =
          fmtNum(dataMax, 3) + " " + displayUnits;
        document.getElementById("gv-mean").textContent =
          fmtNum(mean, 3) + " " + displayUnits;
        document.getElementById("gv-valid").textContent =
          count.toLocaleString();
        showColorScale(renderMin, renderMax, displayUnits);
        document.getElementById("arome-valid-time").textContent =
          `Forecast time: ${fmtValidTime(header, product)}`;

        } catch (err) {
          console.error('aromeShowHour:', err);
          clearMapLayer();
        } finally {
          isDecoding = false;
          if (pendingHourIdx !== null) {
            const next = pendingHourIdx;
            pendingHourIdx = null;
            aromeShowHour(next);
          }
        }
      }

      async function startAromeDownload(packageKey) {
        // Init state + UI before fetch
        aromeState = {
          packageKey,
          resources: [],
          buffers: new Map(),
          decoded: new Map(),
          decodedOrder: [],
          variable: null,
        };

        const varSelect = document.getElementById("arome-var-select");
        varSelect.innerHTML = "";

        const pkgVars = PACKAGES[packageKey].variables;
        aromeState.variable = pkgVars[0].shortName;
        applyDefaultPalette(pkgVars[0].shortName);
        varSelect.innerHTML = pkgVars
          .map((v) => `<option value="${v.shortName}">${v.name}${v.level ? " · " + v.level : ""}${v.units ? " (" + v.units + ")" : ""}</option>`)
          .join("");
        varSelect.value = aromeState.variable;

        const slider = document.getElementById("arome-slider");
        slider.value = 0;

        // Show base map, zoomed to AROME domain
        await initMap();
        map.fitBounds([[-12, 37.5], [16, 55.4]], { padding: 20, animate: false });

        document.getElementById("arome-dl-status").textContent =
          "Fetching file list…";

        let resources;
        try {
          resources = await fetchAromeResources(packageKey);
        } catch (e) {
          document.getElementById("arome-dl-status").textContent =
            "API error: " + e.message;
          return;
        }

        aromeState.resources = resources;
        slider.max = resources.length - 1;
        document.getElementById("arome-dl-status").textContent =
          `Downloading ${resources.length} ${packageKey} files…`;

        // Build progress indicators
        const barsEl = document.getElementById("arome-dl-bars");
        barsEl.innerHTML = "";
        for (const { hour } of resources) {
          const item = document.createElement("div");
          item.className = "arome-dl-item";
          item.id = `dl-${hour}`;
          item.textContent = `${String(hour).padStart(2, "0")}H`;
          barsEl.appendChild(item);
        }

        let doneCount = 0;
        let legendInitialized = false;
        await Promise.all(
          resources.map(async ({ hour, url, filesize }) => {
            const buffer = await downloadFileProg(
              url,
              filesize,
              (loaded, total) => {
                document.getElementById(`dl-${hour}`).style.setProperty(
                  "--pct", Math.round((loaded / total) * 100) + "%"
                );
              },
            );
            aromeState.buffers.set(hour, buffer);

            document.getElementById(`dl-${hour}`).classList.add("done");
            doneCount++;
            document.getElementById("arome-dl-status").textContent =
              `Downloading… ${doneCount} / ${resources.length} files`;

            // On first arrival: populate legend/info from header (no CCSDS decode)
            if (!legendInitialized) {
              legendInitialized = true;
              const data = new Uint8Array(buffer);
              for (const msg of iterateGRIB2Messages(data)) {
                if (msg.product?.shortName === aromeState.variable) {
                  applyDefaultPalette(aromeState.variable);
                  document.getElementById('gv-name').textContent = msg.product.name;
                  document.getElementById('gv-sub').textContent =
                    `${packageKey} · ${fmtLevel(msg.product)} · run ${fmtRefTime(msg.header)}`;
                  const staticScale = STATIC_SCALES[aromeState.variable];
                  const varDef = pkgVars.find(v => v.shortName === aromeState.variable);
                  if (staticScale && varDef) {
                    let displayUnits = varDef.units;
                    if (aromeState.variable === 't') displayUnits = '°C';
                    else if (aromeState.variable === 'p') displayUnits = 'hPa';
                    showColorScale(staticScale.min, staticScale.max, displayUnits);
                  }
                  break;
                }
              }
            }

            // Render map only when the file matching the slider arrives
            const currentIdx = parseInt(slider.value, 10);
            if (resources[currentIdx]?.hour === hour && !gridState) {
              aromeShowHour(currentIdx);
            }
          }),
        );

      }

      // ── Router (hash-based) ───────────────────────────────────────────────────────

      function showView(name) {
        for (const id of ["view-home", "view-grid"])
          document.getElementById(id).style.display =
            id === name ? "block" : "none";
      }

      function route() {
        const hash = location.hash;
        if (hash.startsWith("#grid/")) {
          showView("view-grid");
          document.getElementById("grid-toolbar").style.display = "flex";
          document.getElementById("arome-player-toolbar").style.display =
            "none";
          showGridView(decodeURIComponent(hash.slice(6)));
        } else if (hash.startsWith("#arome/")) {
          const packageKey = hash.slice(7);
          if (!PACKAGES[packageKey]) { location.hash = ""; return; }
          showView("view-grid");
          document.getElementById("grid-toolbar").style.display = "none";
          document.getElementById("arome-player-toolbar").style.display = "flex";
          document.getElementById("arome-dl-panel").style.display = "block";
          if (aromeState?.packageKey !== packageKey) {
            aromeState = null;
            isDecoding = false;
            pendingHourIdx = null;
            gridState = null;
            document.getElementById("arome-dl-bars").innerHTML = "";
            startAromeDownload(packageKey);
          }
        } else {
          showView("view-home");
        }
      }

      window.addEventListener("hashchange", route);
      route();

      // ── Event wiring ──────────────────────────────────────────────────────────────

      const dropZone = document.getElementById("drop-zone");
      const fileInput = document.getElementById("file-input");

      dropZone.addEventListener("click", () => fileInput.click());
      dropZone.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") fileInput.click();
      });
      fileInput.addEventListener("change", () => {
        if (fileInput.files[0]) processFile(fileInput.files[0]);
      });
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("over");
      });
      dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("over"),
      );
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("over");
        if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
      });

      document.getElementById("cards").addEventListener("click", (e) => {
        const btn = e.target.closest(".btn-grid");
        if (btn) location.hash = "#grid/" + encodeURIComponent(btn.dataset.var);
      });

      document.getElementById("back-btn").addEventListener("click", () => {
        clearMapLayer();
        location.hash = "";
      });

      function onPaletteChange(e) {
        currentPalette = e.target.value;
        document.getElementById("palette-select").value = currentPalette;
        document.getElementById("palette-select-arome").value = currentPalette;
        if (gridState) renderHeatmap();
      }
      document.getElementById("palette-select").addEventListener("change", onPaletteChange);

      // ── AROME events ──────────────────────────────────────────────────────────────

      document.getElementById("btn-sp1").addEventListener("click", () => {
        location.hash = "#arome/SP1";
      });

      document.getElementById("btn-sp2").addEventListener("click", () => {
        location.hash = "#arome/SP2";
      });

      document
        .getElementById("arome-back-btn")
        .addEventListener("click", resetApp);

      document
        .getElementById("arome-var-select")
        .addEventListener("change", (e) => {
          if (!aromeState) return;
          aromeState.variable = e.target.value;
          applyDefaultPalette(e.target.value);
          aromeState.decoded.clear();
          aromeState.decodedOrder = [];
          const idx = parseInt(
            document.getElementById("arome-slider").value,
            10,
          );
          aromeShowHour(idx);
        });

      const aromeSlider = document.getElementById("arome-slider");
      aromeSlider.addEventListener("input", () => {
        if (!aromeState) return;
        const idx = parseInt(aromeSlider.value, 10);
        const h = aromeState.resources[idx].hour;
        document.getElementById("arome-hour-label").textContent =
          `+${String(h).padStart(2, "0")}H`;
        aromeShowHour(idx);
      });

      document.getElementById("palette-select-arome").addEventListener("change", onPaletteChange);
    </script>
  </body>
</html>
